<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Súmula Curricular FAPESP{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
    }

    header {
      border-bottom: 2px solid #0057a8;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
    }

    header h1 {
      color: #0057a8;
      font-size: 1.5rem;
    }

    header p {
      color: #555;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
    }

    label .optional {
      font-weight: 400;
      color: #888;
      font-size: 0.8rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="url"],
    textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #0057a8;
    }

    input[type="file"] {
      font-size: 0.9rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .hint {
      font-size: 0.78rem;
      color: #777;
      margin-top: 0.25rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #0057a8;
      margin: 1.5rem 0 0.75rem;
      border-bottom: 1px solid #e0e8f5;
      padding-bottom: 0.35rem;
    }

    button[type="submit"] {
      background: #0057a8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background: #00419e;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .alert-info { background: #e8f0fe; border-left: 4px solid #0057a8; }
    .alert-error { background: #fde8e8; border-left: 4px solid #c00; }
    .alert-success { background: #e8fde8; border-left: 4px solid #080; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-received  { background: #e0e8f5; color: #0057a8; }
    .badge-extracting, .badge-curating, .badge-enriching,
    .badge-generating, .badge-validating, .badge-sending_email
                     { background: #fff3cd; color: #856404; }
    .badge-done      { background: #d1edda; color: #155724; }
    .badge-error     { background: #f8d7da; color: #721c24; }

    .events-list {
      list-style: none;
      margin-top: 1rem;
    }

    .events-list li {
      display: flex;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
    }

    .events-list .ev-step {
      font-weight: 700;
      color: #0057a8;
      min-width: 120px;
      flex-shrink: 0;
    }

    .events-list .ev-time {
      color: #999;
      font-size: 0.75rem;
      min-width: 80px;
      flex-shrink: 0;
    }

    .events-list .ev-msg {
      color: #333;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Súmula Curricular FAPESP</h1>
      <p>Gere sua Súmula Curricular no formato FAPESP a partir de múltiplas fontes</p>
    </header>

    {% block content %}{% endblock %}

    <footer>
      Súmula Curricular FAPESP &mdash; Processamento assíncrono com envio por e-mail
    </footer>
  </div>
</body>
</html>
